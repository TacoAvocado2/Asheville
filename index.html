<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
}

/* HERO */

.hero{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    text-align:center;
}

.logo{
    width:min(85vw,700px);
    height:auto;
    animation:fadeIn 2s ease;
}

/* Hidden H1 for SEO */

h1{
    position:absolute;
    left:-9999px;
    top:-9999px;
}

/* Tagline */

.tagline{
    position:absolute;
    bottom:70px;
    width:100%;
    text-align:center;
    color:#8f8f8f;
    letter-spacing:6px;
    font-size:14px;
    text-transform:uppercase;
    padding:0 20px;
}

/* Scroll Indicator */

.scroll{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#666;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    animation:bounce 2s infinite;
}

/* Animations */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.95);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes bounce{
    0%,20%,50%,80%,100%{
        transform:translateY(0);
    }
    40%{
        transform:translateY(-10px);
    }
    60%{
        transform:translateY(-5px);
    }
}

/* Mobile */

@media(max-width:768px){

    .logo{
        width:90vw;
    }

    .tagline{
        font-size:11px;
        letter-spacing:3px;
        bottom:60px;
    }

    .scroll{
        font-size:10px;
    }

}

</style>

</section>

</body>
