```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asheville66</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.hero{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.logo{
    width:min(80vw, 650px);
    height:auto;
    display:block;
    animation:fadeIn 2s ease;
}

.tagline{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    color:#888;
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    text-align:center;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.95);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@media(max-width:768px){

    .logo{
        width:90vw;
    }

    .tagline{
        font-size:12px;
        letter-spacing:2px;
        bottom:40px;
        padding:0 20px;
    }
}
</style>

</head>
<body>

<section class="hero">
    <img src="img/logo.png" alt="Asheville66" class="logo">

    <div class="tagline">
        ARCHITECTURE • ENGINEERING • CONSTRUCTION
    </div>
</section>

</body>
</html>
```
